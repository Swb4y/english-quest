<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>English Quest</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#eef2ff;color:#172033;font-family:Inter,system-ui,sans-serif}button,textarea{font:inherit}button{cursor:pointer}.app{max-width:440px;margin:auto;padding:20px 16px 96px}.eyebrow{color:#4f46e5;font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}h1,h2,h3,p{margin:0}h1{font-size:32px;line-height:1.08;font-weight:950}h2{font-size:24px;font-weight:950}.muted{color:#64748b;line-height:1.6}.card{background:white;border:1px solid #e0e7ff;border-radius:24px;padding:16px;box-shadow:0 12px 36px rgba(23,32,51,.12)}.stack{display:grid;gap:12px}.grid{display:grid;gap:12px}.stats{grid-template-columns:1fr 1fr;margin-top:18px}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.blue{background:#e0e7ff;color:#4f46e5}.green{background:#dcfce7;color:#15803d}.gold{background:#fef3c7;color:#b45309}.rose{background:#ffe4e6;color:#be123c}.stat strong{display:block;margin-top:10px;font-size:26px}.mission{margin-top:18px;background:#4f46e5;color:white;border-radius:28px;padding:20px;box-shadow:0 12px 36px rgba(23,32,51,.16)}.mission .muted{color:#eef2ff}.btn{width:100%;border:0;border-radius:18px;padding:15px;background:#4f46e5;color:white;font-weight:950}.btn.secondary{background:#eef2ff;color:#4f46e5}.btn.white{background:white;color:#4f46e5}.btn.danger{background:#e11d48}.btn:disabled{background:#cbd5e1}.top{display:flex;align-items:center;justify-content:space-between;gap:16px}.nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #e0e7ff;padding:8px 16px}.nav div{max-width:440px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.nav button{border:0;border-radius:16px;padding:12px 8px;font-weight:900;background:#eef2ff;color:#4f46e5}.nav .active{background:#4f46e5;color:white}.option{width:100%;border:1px solid #e2e8f0;border-radius:16px;padding:13px;text-align:left;background:#f8fafc;font-weight:800}.selected{border-color:#4f46e5;background:#eef2ff;color:#4f46e5}.good{border-color:#22c55e;background:#dcfce7;color:#15803d}.node{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;flex:0 0 auto;background:#cbd5e1;color:#475569;font-weight:950}.node.open{background:#4f46e5;color:white}.node.done{background:#22c55e;color:white}textarea{width:100%;min-height:110px;border:1px solid #c7d2fe;border-radius:18px;padding:14px;background:#eef2ff;font-weight:700}.example{margin-top:12px;border-radius:16px;background:#f8fafc;padding:12px;color:#64748b;line-height:1.5}.progress{height:12px;border-radius:999px;background:rgba(255,255,255,.18);overflow:hidden}.progress div{height:100%;background:#f59e0b}
  </style>
</head>
<body><div id="root"></div><script>
const lessons=[
{id:'airport',t:'At the Airport',c:'Arrival Gate',s:'Find your bag, ask for help, and reach the train.',w:[['boarding pass','ucus karti','Here is my boarding pass.'],['luggage','bagaj','My luggage is blue.'],['gate','kapi','The gate is number twelve.'],['delayed','gecikmis','The flight is delayed.'],['customs','gumruk','We go through customs.']],q:[['What do you show before entering the plane?',['boarding pass','menu','receipt'],'boarding pass'],['Which word means bagaj?',['gate','luggage','customs'],'luggage'],['The flight is ____.',['open','delayed','ready'],'delayed'],['Where do passengers wait?',['gate','hotel','cafe'],'gate'],['Customs is related to ____.',['gumruk','kahve','doktor'],'gumruk']],d:['Officer: May I see your passport, please?',['Sure, here it is.','I want coffee.','It is raining.'],'Sure, here it is.','Officer: Thank you. Welcome to Bright City.'],wr:['Write one sentence asking where your luggage is.','Where is my luggage?']},
{id:'cafe',t:'At a Cafe',c:'Corner Cafe',s:'Order a drink and ask for the price politely.',w:[['menu','menu','Can I see the menu?'],['coffee','kahve','I would like a coffee.'],['bill','hesap','Can I have the bill?'],['table','masa','This table is free.'],['water','su','A glass of water, please.']],q:[['What do you ask for to choose food?',['menu','ticket','map'],'menu'],['How do you ask for hesap?',['The bill, please.','The gate, please.','The doctor, please.'],'The bill, please.'],['Coffee means ____.',['kahve','su','masa'],'kahve'],['A table is a ____.',['masa','canta','otel'],'masa'],['Water means ____.',['su','is','yol'],'su']],d:['Barista: What would you like?',['I would like a coffee, please.','Where is my passport?','I have a fever.'],'I would like a coffee, please.','Barista: Of course. Small or large?'],wr:['Write one polite sentence ordering tea or coffee.','I would like a tea, please.']},
{id:'people',t:'Meeting New People',c:'Language Meetup',s:'Introduce yourself to new people.',w:[['name','isim','My name is Deniz.'],['from','-den/-dan','I am from Turkey.'],['nice','guzel','Nice to meet you.'],['hobby','hobi','My hobby is reading.'],['friend','arkadas','She is my friend.']],q:[['Complete: Nice to ____ you.',['meet','drink','buy'],'meet'],['How do you say Nerelisin?',['Where are you from?','Where is the bill?','Where is the gate?'],'Where are you from?'],['Friend means ____.',['arkadas','bagaj','doktor'],'arkadas'],['Hobby means ____.',['hobi','oda','magaza'],'hobi'],['My name is Ali is about ____.',['introduction','shopping','directions'],'introduction']],d:['Alex: Hi, I am Alex. What is your name?',['My name is Sam.','The bill is here.','Turn left.'],'My name is Sam.','Alex: Nice to meet you, Sam.'],wr:['Write two short sentences introducing yourself.','My name is Deniz. I am from Turkey.']},
{id:'shopping',t:'Shopping',c:'Market Street',s:'Ask prices and choose the right size.',w:[['price','fiyat','What is the price?'],['size','beden','Do you have this in my size?'],['cash','nakit','I will pay in cash.'],['card','kart','Can I pay by card?'],['discount','indirim','Is there a discount?']],q:[['Price means ____.',['fiyat','oda','su'],'fiyat'],['How do you ask for card payment?',['Can I pay by card?','Can I see the gate?','Can I meet you?'],'Can I pay by card?'],['Size means ____.',['beden','isim','gumruk'],'beden'],['Discount means ____.',['indirim','doktor','harita'],'indirim'],['Cash is ____.',['nakit','kahve','tren'],'nakit']],d:['Shop assistant: Can I help you?',['Yes, do you have this in medium?','I need a doctor.','My flight is delayed.'],'Yes, do you have this in medium?','Shop assistant: Let me check for you.'],wr:['Write one sentence asking the price of a jacket.','How much is this jacket?']},
{id:'hotel',t:'Hotel Check-in',c:'City Hotel',s:'Check in for the night.',w:[['reservation','rezervasyon','I have a reservation.'],['room','oda','My room is on the third floor.'],['key','anahtar','Here is your key.'],['breakfast','kahvalti','Breakfast starts at seven.'],['passport','pasaport','May I see your passport?']],q:[['Reservation means ____.',['rezervasyon','fiyat','arkadas'],'rezervasyon'],['Room means ____.',['oda','kart','su'],'oda'],['Breakfast means ____.',['kahvalti','gumruk','beden'],'kahvalti'],['What opens your room door?',['key','bill','menu'],'key'],['Passport means ____.',['pasaport','magaza','indirim'],'pasaport']],d:['Receptionist: Good evening. How can I help you?',['I have a reservation.','I want to buy shoes.','Turn right at the bank.'],'I have a reservation.','Receptionist: Welcome. May I have your passport?'],wr:['Write one sentence saying you have a reservation.','Hello, I have a reservation.']},
{id:'interview',t:'Job Interview',c:'Business Tower',s:'Talk about your skills.',w:[['experience','deneyim','I have two years of experience.'],['skill','beceri','Communication is an important skill.'],['team','takim','I enjoy working in a team.'],['strength','guclu yon','My strength is problem solving.'],['available','musait','I am available next week.']],q:[['Experience means ____.',['deneyim','kahvalti','bagaj'],'deneyim'],['Skill means ____.',['beceri','yol','hesap'],'beceri'],['Team means ____.',['takim','oda','fiyat'],'takim'],['Strength means ____.',['guclu yon','su','kapi'],'guclu yon'],['Available means ____.',['musait','gecikmis','nakit'],'musait']],d:['Interviewer: Tell me about your experience.',['I have one year of experience in sales.','The menu is small.','My luggage is blue.'],'I have one year of experience in sales.','Interviewer: Great. What is your biggest strength?'],wr:['Write one sentence about one skill you have.','I have good communication skills.']},
{id:'directions',t:'Asking for Directions',c:'Old Town Square',s:'Find the museum by asking directions.',w:[['left','sol','Turn left at the park.'],['right','sag','Turn right after the bank.'],['straight','duz','Go straight for two minutes.'],['near','yakin','The museum is near the station.'],['corner','kose','It is on the corner.']],q:[['Left means ____.',['sol','sag','duz'],'sol'],['Right means ____.',['sag','kose','yakin'],'sag'],['Go straight means ____ git.',['duz','sol','nakit'],'duz'],['Near means ____.',['yakin','oda','indirim'],'yakin'],['Corner means ____.',['kose','pasaport','beceri'],'kose']],d:['Traveler: Excuse me, where is the museum?',['Go straight and turn left.','I have a reservation.','Can I pay by card?'],'Go straight and turn left.','Traveler: Thank you very much.'],wr:['Write one sentence asking where the station is.','Excuse me, where is the station?']},
{id:'doctor',t:'Doctor Visit',c:'Health Clinic',s:'Explain how you feel at a clinic.',w:[['fever','ates','I have a fever.'],['cough','oksuruk','I have a cough.'],['pain','agri','I have pain in my back.'],['medicine','ilac','Take this medicine.'],['appointment','randevu','I have an appointment at ten.']],q:[['Fever means ____.',['ates','masa','takim'],'ates'],['Cough means ____.',['oksuruk','gumruk','kart'],'oksuruk'],['Pain means ____.',['agri','fiyat','isim'],'agri'],['Medicine means ____.',['ilac','menu','kose'],'ilac'],['Appointment means ____.',['randevu','bagaj','kahve'],'randevu']],d:['Doctor: What seems to be the problem?',['I have a fever and a cough.','I need a hotel key.','The shop has a discount.'],'I have a fever and a cough.','Doctor: I see. Let me check your temperature.'],wr:['Write one sentence telling a doctor you have pain.','I have pain in my stomach.']}
];
const root=document.querySelector('#root'),key='english-quest-progress';let state=JSON.parse(localStorage.getItem(key)||'null')||{level:null,xp:0,streak:1,done:[],tab:'home'};let active=null,step=0,answers={},dialog='',writing='';const save=()=>localStorage.setItem(key,JSON.stringify(state));const today=()=>lessons.find(l=>!state.done.includes(l.id));const unlocked=()=>Math.min(lessons.length,state.done.length+1);const esc=s=>String(s).replaceAll("'","\\'");
function nav(){return `<nav class="nav"><div>${['home','map','settings'].map(t=>`<button class="${state.tab===t?'active':''}" onclick="state.tab='${t}';save();render()">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</div></nav>`}
function choose(l){state.level=l;save();render()}function start(id){active=lessons.find(l=>l.id===id);step=0;answers={};dialog='';writing='';lesson()}function done(){let score=active.q.reduce((n,q,i)=>n+(answers[i]===q[2]?1:0),0);if(!state.done.includes(active.id)){state.done.push(active.id);state.xp+=30}state.xp+=score*10;save();step=4;lesson(score)}
function render(){if(!state.level)return root.innerHTML=`<main class="app" style="min-height:100vh;display:grid;align-content:center"><p class="eyebrow">English Quest</p><h1>Choose your first city mission.</h1><p class="muted" style="margin-top:12px">Pick a level and start short daily English quests.</p><div class="stack" style="margin-top:24px">${['A1','A2','B1'].map(l=>`<button class="card" style="text-align:left" onclick="choose('${l}')"><span class="pill blue">${l}</span><h2 style="margin-top:10px">${l} Level</h2><p class="muted">Words, quiz, dialogue and writing missions.</p></button>`).join('')}</div></main>`;if(state.tab==='map')return map();if(state.tab==='settings')return settings();home()}
function home(){let l=today();root.innerHTML=`<main class="app"><div class="top"><div><p class="eyebrow">English Quest</p><h1>Daily Adventure</h1></div><div class="card" style="text-align:center"><small>Level</small><h3>${state.level}</h3></div></div><section class="grid stats"><div class="card stat"><span class="pill blue">XP</span><strong>${state.xp}</strong></div><div class="card stat"><span class="pill green">Quest Lv.</span><strong>${Math.floor(state.xp/120)+1}</strong></div><div class="card stat"><span class="pill gold">Streak</span><strong>${state.streak} day</strong></div><div class="card stat"><span class="pill rose">Done</span><strong>${state.done.length}/${lessons.length}</strong></div></section>${l?`<section class="mission"><div class="top"><div><p class="eyebrow" style="color:#eef2ff">Today's Mission</p><h2>${l.t}</h2><p class="muted">${l.c}</p></div><b>${state.done.length+1}/${lessons.length}</b></div><p class="muted" style="margin-top:14px">${l.s}</p><button class="btn white" style="margin-top:16px" onclick="start('${l.id}')">Start Mission</button></section>`:`<section class="mission"><h2>City story complete</h2><p class="muted">Reset progress to replay.</p></section>`}<section class="card" style="margin-top:18px"><div class="top"><h2>Story Mode</h2><span class="pill green">Bright City</span></div><p class="muted" style="margin-top:10px">Complete missions across the city and unlock the next stop.</p></section></main>${nav()}`}
function map(){root.innerHTML=`<main class="app"><p class="eyebrow">Quest Map</p><h1>Bright City Route</h1><section class="stack" style="margin-top:18px">${lessons.map((l,i)=>{let d=state.done.includes(l.id),o=i<unlocked();return`<article class="card"><div style="display:flex;gap:14px;align-items:center"><div class="node ${d?'done':o?'open':''}">${d?'✓':i+1}</div><div><h3>${l.t}</h3><p class="muted">${l.c}</p></div></div><p class="muted" style="margin-top:10px">${l.s}</p><button class="btn" ${o?'':'disabled'} style="margin-top:12px" onclick="start('${l.id}')">${d?'Replay Mission':o?'Start Mission':'Locked'}</button></article>`}).join('')}</section></main>${nav()}`}
function settings(){root.innerHTML=`<main class="app"><p class="eyebrow">Settings</p><h1>Your Quest</h1><section class="card stack" style="margin-top:18px"><h2>Learning Level</h2><div class="grid" style="grid-template-columns:repeat(3,1fr)">${['A1','A2','B1'].map(l=>`<button class="btn ${state.level===l?'':'secondary'}" onclick="choose('${l}')">${l}</button>`).join('')}</div></section><section class="card" style="margin-top:14px"><h2>Progress</h2><p class="muted">XP: ${state.xp} | Streak: ${state.streak} | Done: ${state.done.length}</p></section><section class="card" style="margin-top:14px;background:#fff1f2"><h2>Reset Progress</h2><p class="muted">This clears XP and unlocked missions.</p><button class="btn danger" style="margin-top:12px" onclick="localStorage.removeItem(key);state={level:null,xp:0,streak:1,done:[],tab:'home'};render()">Reset Progress</button></section></main>${nav()}`}
function lesson(score=0){let l=active;if(step===4)return root.innerHTML=`<main class="app"><section class="card" style="text-align:center;margin-top:28px"><p class="eyebrow" style="color:#16a34a">Mission Complete</p><h1>+${score*10+30} XP earned</h1><p class="muted" style="margin-top:10px">Quiz score: ${score}/5. The next mission is unlocked.</p><button class="btn" style="margin-top:16px" onclick="active=null;render()">Return Home</button></section></main>`;let body='';if(step===0)body=l.w.map(w=>`<article class="card"><h3>${w[0]}</h3><b style="color:#4f46e5">${w[1]}</b><p class="example">${w[2]}</p></article>`).join('');if(step===1)body=l.q.map((q,i)=>`<article class="card"><p class="eyebrow">Question ${i+1}</p><h3>${q[0]}</h3><div class="stack" style="margin-top:12px">${q[1].map(o=>`<button class="option ${answers[i]===o?'selected':''}" onclick="answers[${i}]='${esc(o)}';lesson()">${o}</button>`).join('')}</div></article>`).join('');if(step===2)body=`<article class="card"><p class="example" style="color:#4f46e5;background:#eef2ff">${l.d[0]}</p><div class="stack" style="margin-top:12px">${l.d[1].map(o=>`<button class="option ${dialog===o?'good':''}" onclick="dialog='${esc(o)}';lesson()">${o}</button>`).join('')}</div><p class="example">${l.d[3]}</p></article>`;if(step===3)body=`<article class="card"><h3>${l.wr[0]}</h3><textarea oninput="writing=this.value" placeholder="Type your sentence here...">${writing}</textarea><p class="example">Sample: ${l.wr[1]}</p></article>`;let can=step===0||(step===1&&Object.keys(answers).length===5)||(step===2&&dialog===l.d[2])||(step===3&&writing.trim().length>=8);root.innerHTML=`<main class="app"><button class="btn secondary" onclick="active=null;render()">Back</button><section class="mission" style="background:#172033"><p class="eyebrow">${l.c}</p><h1>${l.t}</h1><div class="progress" style="margin-top:14px"><div style="width:${((step+1)/4)*100}%"></div></div></section><section class="stack" style="margin-top:16px">${body}</section><button class="btn" ${can?'':'disabled'} style="position:sticky;bottom:16px;margin-top:16px" onclick="${step===3?'done()':'step++;lesson()'}">${step===3?'Complete Mission':'Continue'}</button></main>`}
render();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script></body></html>
