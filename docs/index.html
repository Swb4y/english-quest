    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#eef2ff;color:#172033;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}button{font:inherit;cursor:pointer}button:disabled{cursor:not-allowed}.app{max-width:440px;margin:auto;padding:20px 16px 96px}.eyebrow{color:#4f46e5;font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}h1,h2,h3,p{margin:0}h1{font-size:32px;line-height:1.08;font-weight:950}h2{font-size:23px;line-height:1.16;font-weight:950}h3{font-size:18px;font-weight:900}.muted{color:#64748b;line-height:1.6}.card{background:white;border:1px solid #e0e7ff;border-radius:24px;padding:16px;box-shadow:0 12px 36px rgba(23,32,51,.12)}.stack{display:grid;gap:12px}.grid{display:grid;gap:12px}.stats{grid-template-columns:1fr 1fr;margin-top:18px}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.blue{background:#e0e7ff;color:#4f46e5}.green{background:#dcfce7;color:#15803d}.gold{background:#fef3c7;color:#b45309}.rose{background:#ffe4e6;color:#be123c}.stat strong{display:block;margin-top:10px;font-size:26px}.mission{margin-top:18px;background:#4f46e5;color:white;border-radius:28px;padding:20px;box-shadow:0 12px 36px rgba(23,32,51,.16)}.mission .muted{color:#eef2ff}.btn{width:100%;border:0;border-radius:18px;padding:15px;background:#4f46e5;color:white;font-weight:950}.btn.secondary{background:#eef2ff;color:#4f46e5}.btn.white{background:white;color:#4f46e5}.btn.danger{background:#e11d48}.btn:disabled{background:#cbd5e1;color:white}.top{display:flex;align-items:center;justify-content:space-between;gap:16px}.nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid #e0e7ff;padding:8px 16px max(8px,env(safe-area-inset-bottom));z-index:10}.nav div{max-width:440px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav button{border:0;border-radius:16px;padding:12px 6px;font-size:12px;font-weight:900;backgrou <body><div id='root'></div><script>

files','dosyalari yedekle','B1','software','Before reinstall.'],['check the device','cihazi kontrol et','A2','hardware','Device issue.'],['the ticket is closed','destek kaydi kapatildi','B1','ticket','Work is finished.']];
const chapters=[['first','First Day at Help Desk','Easy support words','A1','First Ticket',['basic','support','ticket']],['computer','Computer Basics','Parts users mention','A1','Bug Finder',['hardware','basic']],['password','Password Problems','Login and password tickets','A1','Password Master',['password']],['printer','Printer Issues','Offline printers and drivers','A2','Printer Hero',['printer']],['internet','Internet Connection','Slow internet and connection','A2','Network Rookie',['network']],['cable','Network Cable Check','Cable router and modem','A2','Cable Checker',['network']],['remote','Remote Support','Remote access phrases','B1','Remote Helper',['remote','support']],['email','Email Problems','Email and inbox tasks','A2','First Ticket',['email']],['closing','Ticket Closing','Close solved issues','B1','First Ticket',['ticket']],['hardware','Hardware Problems','Broken device checks','A2','Bug Finder',['hardware']],['software','Software Update','Install and update tasks','A2','Bug Finder',['software']],['slow','Slow Computer','Simple speed support','A2','Bug Finder',['support','hardware']],['office','Office IT Support','Mixed office tickets','B1','Network Rookie',['support','ticket','printer','network','software','hardware']]];
const rank={A1:1,A2:2,B1:3};const key='english-quest-it';let st=JSON.parse(localStorage.getItem(key)||'null')||{level:null,xp:0,streak:1,done:[],tasks:[],badges:[],tab:'home'};let active=null,tasks=[],idx=0,pick=[],wordPick=[],choice='',wrong=0,hint=false,fb='',ok=false;const root=document.querySelector('#root');const save=()=>localStorage.setItem(key,JSON.stringify(st));
function rnd(seed){let x=seed%2147483647;return()=>((x=x*16807%2147483647)-1)/2147483646}function sh(a,seed){let r=rnd(seed),b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(r()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}function day(){return Number(new Date().toISOString().slice(0,10).replaceAll('-',''))}function playCh(){return chapters.filter(c=>rank[c[3]]<=rank[st.level])}function unlocked(){return Math.min(playCh().length,st.done.length+1)}function norm(s){return s.trim().toLowerCase().split(' ').filter(Boolean).join(' ')}function nav(){return `<nav class='nav'><div>${['home','map','play','settings'].map(t=>`<button class='${st.tab===t?'active':''}' onclick='st.tab=${JSON.stringify(t)};save();render()'>${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</div></nav>`}function choose(l){st.level=l;save();render()}
function build(ch){let seed=day()+ch[0].length,cats=ch[5],ww=sh(words.filter(w=>cats.includes(w[3])&&rank[w[2]]<=rank[st.level]),seed),pp=sh(phrases.filter(p=>cats.includes(p[3])&&rank[p[2]]<=rank[st.level]),seed+7),out=[];for(let i=0;i<7;i++){if(i%4===2&&pp.length){let p=pp.shift();out.push({m:'ticket',a:p[0],p:p[1],s:p[4],xp:8})}else if(i%3===1&&pp.length){let p=pp.shift();out.push({m:'sentence',a:p[0],p:p[1],xp:6})}else if(i%3===0&&ww.length){let w=ww.shift();out.push({m:'word',a:w[0],p:w[1],xp:5})}else{let w=ww.shift()||words[(seed+i)%words.length];let wrongs=sh(words.filter(x=>x[0]!==w[0]).map(x=>x[0]),seed+i).slice(0,2);out.push({m:'match',a:w[0],p:w[1],xp:5,choices:sh([w[0],...wrongs],seed+i+99)})}}return out.map((t,i)=>({...t,id:ch[0]+'-'+i+'-'+t.a}))}function startByIndex(i){start(playCh()[i])}function start(ch){active=ch;tasks=build(ch);idx=0;reset(false);game()}function reset(newIdx=true){if(newIdx)idx++;pick=[];wordPick=[];choice='';wrong=0;hint=false;fb='';ok=false}function letters(){return sh(tasks[idx].a.replaceAll(' ','').toUpperCase().split(''),idx+active[0].length+11)}function chips(){return sh(tasks[idx].a.toLowerCase().split(' '),idx+active[0].length+22)}function cur(){let t=tasks[idx];return t.m==='word'?pick.map(i=>letters()[i]).join(''):t.m==='sentence'||t.m==='ticket'?wordPick.map(i=>chips()[i]).join(' '):choice}
function check(){let t=tasks[idx];if(!cur()){fb='Pick an answer first.';game();return}if(norm(cur())===norm(t.a)){ok=true;fb=['Great!','Nice!','Good job!','Well done!'][idx%4]+' +'+t.xp+' XP';if(!st.tasks.includes(t.id)){st.tasks.push(t.id);st.xp+=t.xp;save()}game();return}wrong++;hint=true;fb=wrong>1?'Almost! Correct answer: '+t.a:['Almost!','Try again!','You are close!'][wrong-1];game()}function next(){if(idx+1<tasks.length){reset();game();return}if(!st.done.includes(active[0])){st.done.push(active[0]);st.xp+=25;if(!st.badges.includes(active[4]))st.badges.push(active[4]);save()}complete()}
function render(){if(!st.level)return root.innerHTML=`<main class='app' style='min-height:100vh;display:grid;align-content:center'><p class='eyebrow'>English Quest</p><h1>Choose your IT support level.</h1><p class='muted' style='margin-top:12px'>Build English words from letters, solve tickets and earn badges.</p><div class='stack' style='margin-top:24px'>${['A1','A2','B1'].map(l=>`<button class='card' style='text-align:left' onclick='choose(${JSON.stringify(l)})'><span class='pill blue'>${l}</span><h2 style='margin-top:10px'>${l} ${l==='A1'?'Starter':l==='A2'?'Technician':'Support Pro'}</h2><p class='muted'>Fast mobile IT English missions.</p></button>`).join('')}</div></main>`;if(st.tab==='map')return map();if(st.tab==='play')return play();if(st.tab==='settings')return settings();home()}function home(){let pcs=playCh(),n=pcs.find(c=>!st.done.includes(c[0]))||pcs[0],ni=pcs.indexOf(n);root.innerHTML=`<main class='app'><div class='top'><div><p class='eyebrow'>English Quest</p><h1>IT Word Quest</h1></div><div class='card' style='text-align:center'><small>Level</small><h3>${st.level}</h3></div></div><section class='grid stats'><div class='card stat'><span class='pill blue'>XP</span><strong>${st.xp}</strong></div><div class='card stat'><span class='pill green'>Quest Lv.</span><strong>${Math.floor(st.xp/120)+1}</strong></div><div class='card stat'><span class='pill gold'>Streak</span><strong>${st.streak} day</strong></div><div class='card stat'><span class='pill rose'>Done</span><strong>${st.done.length}/${pcs.length}</strong></div></section><section class='mission'><div class='top'><div><p class='eyebrow' style='color:#eef2ff'>Today Mission</p><h2>${n[1]}</h2><p class='muted'>${n[2]}</p></div><b>${st.done.length+1}/${pcs.length}</b></div><p class='muted' style='margin-top:14px'>Build IT words, solve tickets, unlock badges.</p><button class='btn white' style='margin-top:16px' onclick='startByIndex(${ni})'>Continue Mission</button></section><section class='card' style='margin-top:18px'><h2>Badges</h2><p class='muted' style='margin-top:8px'>${st.badges.length?st.badges.join(' / '):'Finish your first mission to unlock a badge.'}</p></section></main>${nav()}`}function map(){let pcs=playCh();root.innerHTML=`<main class='app'><p class='eyebrow'>Quest Map</p><h1>IT Support Path</h1><section class='stack' style='margin-top:18px'>${pcs.map((c,i)=>{let d=st.done.includes(c[0]),o=i<unlocked();return`<article class='card'><div style='display:flex;gap:14px;align-items:center'><div class='node ${d?'done':o?'open':''}'>${d?'OK':i+1}</div><div><h3>${c[1]}</h3><p class='muted'>${c[2]}</p></div></div><p class='muted' style='margin-top:10px'>${c[3]} / Badge: ${c[4]}</p><button class='btn' ${o?'':'disabled'} style='margin-top:12px' onclick='startByIndex(${i})'>${d?'Replay Mission':o?'Start Mission':'Locked'}</button></article>`}).join('')}</section></main>${nav()}`}function play(){let pcs=playCh(),n=pcs.find(c=>!st.done.includes(c[0]))||pcs[0],ni=pcs.indexOf(n);root.innerHTML=`<main class='app'><p class='eyebrow'>Daily Mix</p><h1>Quick IT Tasks</h1><section class='card' style='margin-top:18px'><h2>Ready for a fast round?</h2><p class='muted' style='margin-top:8px'>Random words change by day. Progress stays saved on this phone.</p><button class='btn' style='margin-top:16px' onclick='startByIndex(${ni})'>Start Next Chapter</button></section></main>${nav()}`}function settings(){root.innerHTML=`<main class='app'><p class='eyebrow'>Settings</p><h1>Your Quest</h1><section class='card stack' style='margin-top:18px'><h2>Learning Level</h2><div class='grid' style='grid-template-columns:repeat(3,1fr)'>${['A1','A2','B1'].map(l=>`<button class='btn ${st.level===l?'':'secondary'}' onclick='choose(${JSON.stringify(l)})'>${l}</button>`).join('')}</div></section><section class='card' style='margin-top:14px'><h2>Progress</h2><p class='muted'>XP: ${st.xp} | Badges: ${st.badges.length} | Chapters: ${st.done.length}</p></section><section class='card' style='margin-top:14px;background:#fff1f2'><h2>Reset Progress</h2><p class='muted'>This clears XP, badges and unlocked chapters.</p><button class='btn danger' style='margin-top:12px' onclick='localStorage.removeItem(key);st={level:null,xp:0,streak:1,done:[],tasks:[],badges:[],tab:"home"};render()'>Reset Progress</button></section></main>${nav()}`}
function game(){let t=tasks[idx],l=letters(),w=chips(),ans=cur();root.innerHTML=`<main class='app'><button class='btn secondary' onclick='active=null;render()'>Back</button><section class='mission' style='background:#172033'><p class='eyebrow'>${t.m.replace('-',' ')}</p><h1>${active[1]}</h1><div class='progress' style='margin-top:14px'><div style='width:${((idx+(ok?1:0))/tasks.length)*100}%'></div></div></section><section class='card' style='margin-top:16px'>${t.s?`<p class='muted' style='font-weight:900;margin-bottom:10px'>Ticket: ${t.s}</p>`:''}<p class='eyebrow'>Turkish clue</p><h2 style='margin-top:8px'>${t.p}</h2>${hint?`<p class='feedback warn'>Hint: ${t.a.split(' ').length>1?t.a.split(' ').length+' words':'First letter '+t.a[0].toUpperCase()}</p>`:''}</section>${t.m==='word'?`<section style='margin-top:16px'><div class='grid' style='grid-template-columns:repeat(${Math.min(t.a.length,7)},1fr)'>${t.a.split('').map((_,i)=>`<div class='slot'>${ans[i]||''}</div>`).join('')}</div><div class='grid' style='grid-template-columns:repeat(4,1fr);margin-top:16px'>${l.map((x,i)=>`<button class='letter' ${pick.includes(i)||ok?'disabled':''} onclick='pick.push(${i});game()'>${x}</button>`).join('')}</div></section>`:''}${t.m==='sentence'||t.m==='ticket'?`<section style='margin-top:16px'><div class='answer'>${ans||'Tap words to build the answer'}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:14px'>${w.map((x,i)=>`<button class='chip' ${wordPick.includes(i)||ok?'disabled':''} onclick='wordPick.push(${i});game()'>${x}</button>`).join('')}</div></section>`:''}${t.m==='match'?`<section class='stack' style='margin-top:16px'>${(t.choices||[]).map(o=>`<button class='option ${choice===o?'selected':''}' ${ok?'disabled':''} onclick='choice=${JSON.stringify(o)};game()'>${o}</button>`).join('')}</section>`:''}${fb?`<p class='feedback ${ok?'ok':'warn'}'>${fb}</p>`:''}<div class='grid' style='grid-template-columns:repeat(3,1fr);margin-top:16px'><button class='btn secondary' ${ok?'disabled':''} onclick='pick.pop();wordPick.pop();choice="";game()'>Undo</button><button class='btn secondary' ${ok?'disabled':''} onclick='pick=[];wordPick=[];choice="";game()'>Clear</button><button class='btn secondary' onclick='hint=true;game()'>Hint</button></div><button class='btn' style='position:sticky;bottom:16px;margin-top:16px' onclick='${ok?'next()':'check()'}'>${ok?(idx+1===tasks.length?'Complete Chapter':'Next Task'):'Check Answer'}</button></main>`}function complete(){root.innerHTML=`<main class='app'><section class='card' style='text-align:center;margin-top:28px'><p class='eyebrow' style='color:#15803d'>Mission Completed</p><h1>New IT Skill Unlocked</h1><div style='font-size:44px;margin-top:16px'>STAR</div><h2 style='margin-top:8px'>${active[4]}</h2><p class='muted' style='margin-top:8px'>+25 XP chapter bonus earned.</p><button class='btn' style='margin-top:16px' onclick='active=null;render()'>Continue</button></section></main>`}
render();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
